<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AIR CANVAS LITE</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Familjen+Grotesk:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #06080d;
            --glass: rgba(10,14,22,0.88);
            --border: rgba(255,255,255,0.08);
            --accent: #5bffb8;
            --pink: #ff5bdb;
            --blue: #5bc8ff;
            --text: #dde2ee;
            --muted: rgba(221,226,238,0.38);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); font-family: 'Familjen Grotesk', sans-serif; overflow: hidden; color: var(--text); height: 100vh; width: 100vw; }

        /* ── LAYERS ── */
        #app { position: relative; width: 100vw; height: 100vh; }
        #webcam { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); display: none; }
        #view-canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

        /* ── TOOLBAR ── */
        #toolbar {
            position: absolute;
            bottom: 28px; left: 50%; transform: translateX(-50%);
            z-index: 200;
            display: flex; align-items: center; gap: 10px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 10px 16px;
            backdrop-filter: blur(24px) saturate(1.6);
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
        }

        .divider { width: 1px; height: 24px; background: var(--border); margin: 0 2px; }

        .swatch {
            width: 26px; height: 26px; border-radius: 50%; cursor: pointer;
            border: 2px solid transparent; transition: transform 0.15s, border-color 0.15s;
            flex-shrink: 0;
        }
        .swatch:hover { transform: scale(1.15); }
        .swatch.active { border-color: white; box-shadow: 0 0 0 2px rgba(255,255,255,0.15); }

        .size-wrap { display: flex; align-items: center; gap: 7px; }
        .size-label { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--muted); min-width: 30px; }
        input[type=range] {
            -webkit-appearance: none; width: 70px; height: 3px;
            background: rgba(255,255,255,0.12); border-radius: 2px; outline: none; cursor: pointer;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none; width: 13px; height: 13px; border-radius: 50%;
            background: var(--accent); cursor: pointer;
        }

        .tb-btn {
            font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: 0.12em;
            background: rgba(255,255,255,0.05); border: 1px solid var(--border);
            color: var(--muted); padding: 6px 12px; border-radius: 10px; cursor: pointer;
            transition: background 0.15s, color 0.15s, border-color 0.15s;
        }
        .tb-btn:hover { background: rgba(255,255,255,0.1); color: #fff; border-color: rgba(255,255,255,0.2); }

        /* ── GESTURE BADGE ── */
        #mode-badge {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%);
            z-index: 200;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 12px; padding: 7px 16px;
            font-family: 'DM Mono', monospace; font-size: 11px; letter-spacing: 0.18em;
            color: var(--accent); backdrop-filter: blur(20px);
            transition: color 0.2s;
            pointer-events: none;
        }
        #mode-badge.erase { color: var(--pink); }
        #mode-badge.idle  { color: var(--muted); }

        /* ── CURSOR RINGS (one per hand) ── */
        .cursor-ring {
            position: absolute; pointer-events: none; z-index: 300;
            width: 24px; height: 24px; border-radius: 50%;
            border: 2px solid var(--accent);
            transform: translate(-50%, -50%);
            transition: border-color 0.15s, width 0.12s, height 0.12s, opacity 0.2s;
            opacity: 0;
        }
        .cursor-ring.visible { opacity: 1; }
        .cursor-ring.erase { border-color: var(--pink); width: 80px; height: 80px; }
        /* left-hand eraser ring is always pink */
        #ring-left { border-color: var(--pink); }

        /* ── GESTURE GUIDE ── */
        #guide {
            position: absolute; top: 20px; right: 20px; z-index: 200;
            background: var(--glass); border: 1px solid var(--border);
            border-radius: 14px; padding: 14px 16px;
            backdrop-filter: blur(20px); font-size: 11px; line-height: 1.8;
            color: var(--muted);
        }
        #guide strong { color: var(--text); font-weight: 700; display: block; margin-bottom: 6px; font-size: 10px; letter-spacing: 0.2em; }

        /* ── LOADING ── */
        #loading {
            position: absolute; inset: 0; background: var(--bg); z-index: 999;
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
        }
        #loading h1 { font-size: 22px; font-weight: 700; letter-spacing: 0.45em; color: #fff; }
        #load-status { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); }
        .loader-bar { width: 180px; height: 2px; background: rgba(255,255,255,0.08); border-radius: 2px; overflow: hidden; }
        .loader-fill { height: 100%; width: 0; background: var(--accent); border-radius: 2px; transition: width 0.4s; }
    </style>
</head>
<body>
<div id="app">

    <div id="loading">
        <h1>AIR CANVAS</h1>
        <div class="loader-bar"><div class="loader-fill" id="loader-fill"></div></div>
        <div id="load-status">LOADING HAND MODEL…</div>
    </div>

    <video id="webcam" autoplay playsinline></video>
    <canvas id="view-canvas"></canvas>
    <div id="ring-right" class="cursor-ring"></div>
    <div id="ring-left"  class="cursor-ring"></div>

    <div id="mode-badge" class="idle">IDLE</div>

    <div id="guide">
        <strong>// RIGHT HAND</strong>
        ☝️ Index only → Draw<br>
        🖐 Open (4+) → Erase<br>
        ✊ Fist → Lift pen<br>
        <strong style="margin-top:8px;display:block">// LEFT HAND</strong>
        🤏 Pinch → Resize brush
    </div>

    <div id="toolbar">
        <!-- Colors -->
        <div class="swatch active" style="background:#5bffb8" data-color="#5bffb8" data-name="MINT" title="Mint"></div>
        <div class="swatch"       style="background:#5bc8ff" data-color="#5bc8ff" data-name="CYAN" title="Cyan"></div>
        <div class="swatch"       style="background:#ff5bdb" data-color="#ff5bdb" data-name="PINK" title="Pink"></div>
        <div class="swatch"       style="background:#fff"    data-color="#ffffff" data-name="WHITE" title="White"></div>

        <div class="divider"></div>

        <!-- Size -->
        <div class="size-wrap">
            <input type="range" id="size-slider" min="4" max="60" value="14">
            <span class="size-label" id="size-label">14px</span>
        </div>

        <div class="divider"></div>

        <button class="tb-btn" onclick="clearCanvas()">CLEAR</button>
        <button class="tb-btn" onclick="exportPNG()">SAVE</button>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
// ── ELEMENTS ──────────────────────────────────────────────────────────────
const video      = document.getElementById('webcam');
const viewCanvas = document.getElementById('view-canvas');
const vCtx       = viewCanvas.getContext('2d');
const ringRight  = document.getElementById('ring-right');
const ringLeft   = document.getElementById('ring-left');
const badge      = document.getElementById('mode-badge');
const sizeSlider = document.getElementById('size-slider');
const sizeLabel  = document.getElementById('size-label');

// Off-screen drawing canvas — persists across frames
const drawCanvas = document.createElement('canvas');
const dCtx       = drawCanvas.getContext('2d');

// ── STATE ─────────────────────────────────────────────────────────────────
let drawColor = '#5bffb8';
let brushSize = 14;

// Per-hand smoothed positions (EMA)
const smooth = { right: { x: 0, y: 0 }, left: { x: 0, y: 0 } };
const ALPHA = 0.28; // lower = smoother but laggier

// Drawing continuity — only for right hand
let prevX = null, prevY = null, prevMidX = null, prevMidY = null;

// ── HELPERS ───────────────────────────────────────────────────────────────
const dist = (a, b) => Math.hypot(a.x - b.x, a.y - b.y);

function fingersExtended(lm) {
    const wrist = lm[0];
    return {
        index:  dist(lm[8],  wrist) > dist(lm[6],  wrist) * 1.12,
        middle: dist(lm[12], wrist) > dist(lm[10], wrist) * 1.12,
        ring:   dist(lm[16], wrist) > dist(lm[14], wrist) * 1.12,
        pinky:  dist(lm[20], wrist) > dist(lm[18], wrist) * 1.12,
    };
}

function placeRing(el, sx, sy, W, H, mode) {
    el.style.left = (sx / W * 100) + 'vw';
    el.style.top  = (sy / H * 100) + 'vh';
    el.classList.add('visible');
    el.classList.toggle('erase', mode === 'erase');
}

function hideRing(el) {
    el.classList.remove('visible', 'erase');
}

// ── RIGHT HAND: DRAW / ERASE ───────────────────────────────────────────────
function processRightHand(lm, W, H) {
    // Mirror x to match mirrored video
    const m = lm.map(p => ({ x: 1 - p.x, y: p.y }));
    const f = fingersExtended(m);
    const extCount = [f.index, f.middle, f.ring, f.pinky].filter(Boolean).length;

    const rawX = m[8].x * W;
    const rawY = m[8].y * H;
    smooth.right.x = rawX * ALPHA + smooth.right.x * (1 - ALPHA);
    smooth.right.y = rawY * ALPHA + smooth.right.y * (1 - ALPHA);
    const sx = smooth.right.x, sy = smooth.right.y;

    if (extCount >= 4) {
        // ── OPEN HAND → ERASE ─────────────────────────────────────────
        placeRing(ringRight, sx, sy, W, H, 'erase');
        setMode('erase');
        dCtx.globalCompositeOperation = 'destination-out';
        dCtx.beginPath();
        dCtx.arc(sx, sy, 38, 0, Math.PI * 2);
        dCtx.fill();
        prevX = null; prevY = null; prevMidX = null; prevMidY = null;

    } else if (f.index && !f.middle) {
        // ── INDEX ONLY → DRAW ─────────────────────────────────────────
        placeRing(ringRight, sx, sy, W, H, 'draw');
        setMode('draw');
        dCtx.globalCompositeOperation = 'source-over';
        dCtx.strokeStyle = drawColor;
        dCtx.lineWidth   = brushSize;
        dCtx.lineCap     = 'round';
        dCtx.lineJoin    = 'round';

        if (prevX !== null) {
            const mx = (prevX + sx) / 2;
            const my = (prevY + sy) / 2;
            dCtx.beginPath();
            if (prevMidX !== null) {
                dCtx.moveTo(prevMidX, prevMidY);
                dCtx.quadraticCurveTo(prevX, prevY, mx, my);
            } else {
                dCtx.moveTo(prevX, prevY);
                dCtx.lineTo(mx, my);
            }
            dCtx.stroke();
            prevMidX = mx; prevMidY = my;
        }
        prevX = sx; prevY = sy;

    } else {
        // ── FIST / ANYTHING ELSE → IDLE ───────────────────────────────
        placeRing(ringRight, sx, sy, W, H, 'idle');
        setMode('idle');
        prevX = null; prevY = null; prevMidX = null; prevMidY = null;
    }
}

// ── LEFT HAND: PINCH TO RESIZE BRUSH ──────────────────────────────────────
function processLeftHand(lm, W, H) {
    const m = lm.map(p => ({ x: 1 - p.x, y: p.y }));

    // Track left hand cursor at index tip
    const rawX = m[8].x * W;
    const rawY = m[8].y * H;
    smooth.left.x = rawX * ALPHA + smooth.left.x * (1 - ALPHA);
    smooth.left.y = rawY * ALPHA + smooth.left.y * (1 - ALPHA);
    placeRing(ringLeft, smooth.left.x, smooth.left.y, W, H, 'left');

    // Pinch distance (thumb tip ↔ index tip) → brush size
    const pinchDist = dist(m[4], m[8]);
    // Map ~0.02 (fully pinched) to ~0.25 (wide open) → 4px–60px
    const newSize = Math.round(Math.max(4, Math.min(60, pinchDist * 280)));
    brushSize = newSize;
    sizeSlider.value = newSize;
    sizeLabel.textContent = newSize + 'px';
}

// ── MAIN RESULTS HANDLER ──────────────────────────────────────────────────
function onResults(results) {
    const W = video.videoWidth  || 1280;
    const H = video.videoHeight || 720;

    if (viewCanvas.width !== W) {
        viewCanvas.width = drawCanvas.width = W;
        viewCanvas.height = drawCanvas.height = H;
    }

    // 1. Mirrored webcam feed
    vCtx.save();
    vCtx.clearRect(0, 0, W, H);
    vCtx.translate(W, 0);
    vCtx.scale(-1, 1);
    vCtx.drawImage(results.image, 0, 0, W, H);
    vCtx.restore();

    vCtx.fillStyle = 'rgba(0,0,0,0.12)';
    vCtx.fillRect(0, 0, W, H);

    // 2. Per-hand processing
    // MediaPipe reports label from its own (unmirrored) perspective:
    //   label "Right" in the feed = the person's LEFT hand (because mirror)
    //   label "Left"  in the feed = the person's RIGHT hand
    // So we flip: label "Left" → drawing hand, label "Right" → resize hand.
    let sawRight = false, sawLeft = false;

    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        results.multiHandLandmarks.forEach((rawLm, i) => {
            const label = results.multiHandedness[i]?.label; // "Left" or "Right" from MP
            // Because the video is mirrored, MP's "Left" = user's right hand (drawing)
            if (label === 'Left') {
                sawRight = true;
                processRightHand(rawLm, W, H);
            } else if (label === 'Right') {
                sawLeft = true;
                processLeftHand(rawLm, W, H);
            }
        });
    }

    if (!sawRight) {
        hideRing(ringRight);
        setMode('idle');
        prevX = null; prevY = null; prevMidX = null; prevMidY = null;
    }
    if (!sawLeft) {
        hideRing(ringLeft);
    }

    // 3. Composite drawing layer
    vCtx.drawImage(drawCanvas, 0, 0);
}

// ── MODE BADGE ────────────────────────────────────────────────────────────
function setMode(mode) {
    badge.className = mode;
    badge.textContent = mode === 'draw'  ? '✏  DRAWING'
                      : mode === 'erase' ? '◌  ERASING'
                      : '—  IDLE';
    // Tint ring to current draw color when drawing
    if (mode === 'draw') ringRight.style.borderColor = drawColor;
    else if (mode === 'erase') ringRight.style.borderColor = '';
}

// ── ACTIONS ───────────────────────────────────────────────────────────────
function clearCanvas() {
    dCtx.clearRect(0, 0, drawCanvas.width, drawCanvas.height);
}

function exportPNG() {
    const exp = document.createElement('canvas');
    exp.width  = drawCanvas.width  || 1280;
    exp.height = drawCanvas.height || 720;
    const ec = exp.getContext('2d');
    ec.fillStyle = '#06080d';
    ec.fillRect(0, 0, exp.width, exp.height);
    ec.drawImage(drawCanvas, 0, 0);
    const a = document.createElement('a');
    a.download = 'air-canvas.png';
    a.href = exp.toDataURL('image/png');
    a.click();
}

// ── COLOR SWATCHES ────────────────────────────────────────────────────────
document.querySelectorAll('.swatch').forEach(s => {
    s.addEventListener('click', () => {
        drawColor = s.dataset.color;
        ringRight.style.borderColor = drawColor;
        document.querySelectorAll('.swatch').forEach(x => x.classList.remove('active'));
        s.classList.add('active');
    });
});

// ── SIZE SLIDER ───────────────────────────────────────────────────────────
sizeSlider.addEventListener('input', () => {
    brushSize = parseInt(sizeSlider.value, 10);
    sizeLabel.textContent = brushSize + 'px';
});

// ── MEDIAPIPE INIT ────────────────────────────────────────────────────────
const loaderFill = document.getElementById('loader-fill');
const loadStatus = document.getElementById('load-status');
loaderFill.style.width = '30%';

const hands = new Hands({
    locateFile: f => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${f}`
});
hands.setOptions({
    maxNumHands: 2,           // FIX: was 1 — now detects both hands
    modelComplexity: 1,
    minDetectionConfidence: 0.75,
    minTrackingConfidence: 0.75
});
hands.onResults(onResults);

loaderFill.style.width = '65%';
loadStatus.textContent = 'STARTING CAMERA…';

const cam = new Camera(video, {
    onFrame: async () => {
        try { await hands.send({ image: video }); }
        catch(e) { /* skip bad frames */ }
    },
    width: 1280, height: 720
});

cam.start().then(() => {
    loaderFill.style.width = '100%';
    loadStatus.textContent = 'READY';
    setTimeout(() => { document.getElementById('loading').style.display = 'none'; }, 400);
}).catch(err => {
    loadStatus.textContent = 'CAMERA ERROR: ' + (err.message || err);
    loaderFill.style.background = '#ff5b5b';
});
</script>
</body>
</html>
